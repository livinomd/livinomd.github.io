<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>我的遊戲網站</title>

  <!-- 遊戲風字體 -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #0f172a, #020617);
      color: #00ffcc;
      font-family: 'Press Start 2P', cursive;
      text-align: center;
    }

    h1 {
      margin-top: 100px;
      font-size: 24px;
      text-shadow: 0 0 10px #00ffcc;
    }

    p {
      margin: 20px;
      color: #94a3b8;
    }

    .btn {
      display: inline-block;
      margin-top: 40px;
      padding: 15px 30px;
      border: 2px solid #00ffcc;
      color: #00ffcc;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ffcc;
      color: black;
      box-shadow: 0 0 20px #00ffcc;
    }

    .box {
      margin-top: 80px;
    }
  </style>
</head>

<body>

  <h1>🎮 MY GAME SITE</h1>

  <p>歡迎來到我的遊戲世界</p>

  <div class="box">
    <a href="#" class="btn">開始遊戲</a>
  </div>

</body>
</html>
